# Purpose: Deploy and expose order-service that composes user + product data.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: retail-aiops
  labels:
    app: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: local/order-service:0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: USER_SERVICE_URL
              value: http://user-service.retail-aiops.svc.cluster.local
            - name: PRODUCT_SERVICE_URL
              value: http://product-service.retail-aiops.svc.cluster.local
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "150m"
              memory: "192Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"
---
# Purpose: ClusterIP service for internal DNS-based discovery of order-service.
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: retail-aiops
spec:
  selector:
    app: order-service
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP

