# Purpose: Deploy and expose api-gateway as the single entry point for clients.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: retail-aiops
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: local/api-gateway:0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: USER_SERVICE_URL
              value: http://user-service.retail-aiops.svc.cluster.local
            - name: PRODUCT_SERVICE_URL
              value: http://product-service.retail-aiops.svc.cluster.local
            - name: ORDER_SERVICE_URL
              value: http://order-service.retail-aiops.svc.cluster.local
            - name: AIOPS_SERVICE_URL
              value: http://aiops-service.retail-aiops.svc.cluster.local
            - name: DASHBOARD_USERNAME
              value: sre-admin
            - name: DASHBOARD_PASSWORD
              value: k8s-aiops-2026
            - name: SESSION_TTL_SECONDS
              value: "28800"
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "700m"
              memory: "512Mi"
---
# Purpose: ClusterIP service to expose gateway internally and behind ingress.
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: retail-aiops
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
