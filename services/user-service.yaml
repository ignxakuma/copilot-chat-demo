# Purpose: Deploy and expose the user-service microservice.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: retail-aiops
  labels:
    app: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: local/user-service:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
---
# Purpose: ClusterIP service for internal DNS-based discovery of user-service.
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: retail-aiops
spec:
  selector:
    app: user-service
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP

