# Purpose: Deploy and expose the web frontend dashboard for interactive platform operations.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-frontend
  namespace: retail-aiops
  labels:
    app: web-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-frontend
  template:
    metadata:
      labels:
        app: web-frontend
    spec:
      containers:
        - name: web-frontend
          image: local/web-frontend:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
# Purpose: ClusterIP service for serving frontend UI traffic inside the cluster and via ingress.
apiVersion: v1
kind: Service
metadata:
  name: web-frontend
  namespace: retail-aiops
spec:
  selector:
    app: web-frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
