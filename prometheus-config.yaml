# Purpose: Prometheus scrape configuration for all microservices and itself.
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: retail-aiops
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'api-gateway'
        metrics_path: /metrics
        static_configs:
          - targets: ['api-gateway.retail-aiops.svc.cluster.local:80']
      - job_name: 'user-service'
        metrics_path: /metrics
        static_configs:
          - targets: ['user-service.retail-aiops.svc.cluster.local:80']
      - job_name: 'product-service'
        metrics_path: /metrics
        static_configs:
          - targets: ['product-service.retail-aiops.svc.cluster.local:80']
      - job_name: 'order-service'
        metrics_path: /metrics
        static_configs:
          - targets: ['order-service.retail-aiops.svc.cluster.local:80']
      - job_name: 'aiops-service'
        metrics_path: /metrics
        static_configs:
          - targets: ['aiops-service.retail-aiops.svc.cluster.local:80']
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

