# Purpose: Prometheus deployment and service for metrics storage and querying.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: retail-aiops
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: local/prometheus:v2.55.1-arm64
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
---
# Purpose: Service endpoint for Prometheus web UI and API access.
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: retail-aiops
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP

