<!DOCTYPE html>
<html>
<head>
    <title>Copilot Chat Microservice</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: auto; padding: 20px; }
        #chatbox { height: 400px; border: 1px solid #ccc; overflow-y: auto; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .user { color: #0056b3; margin-bottom: 5px; }
        .bot { color: #155724; margin-bottom: 15px; }
        .input-area { display: flex; gap: 10px; }
        #message { flex-grow: 1; padding: 8px; border: 1px solid #ccc; border-radius: 3px; }
        button { padding: 8px 15px; cursor: pointer; background: #0056b3; color: white; border: none; border-radius: 3px; }
    </style>
</head>
<body>
    <h2>Copilot AI Chat</h2>
    <div id="chatbox"></div>
    <div class="input-area">
        <input type="text" id="message" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const msgInput = document.getElementById("message");
            const msg = msgInput.value.trim();
            if (!msg) return;
            
            appendMessage("You", msg, "user");
            msgInput.value = "";

            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: msg })
            });
            const data = await response.json();
            appendMessage("Assistant", data.reply, "bot");
        }

        function appendMessage(sender, text, className) {
            const chatbox = document.getElementById("chatbox");
            chatbox.innerHTML += `<div class="${className}"><strong>${sender}:</strong> ${text}</div>`;
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
